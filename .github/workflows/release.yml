name: Build and Release

on:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    check-version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            changed: ${{ steps.check.outputs.changed }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Get version from Cargo.toml
              id: version
              run: |
                  version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
                  echo "version=$version" >> $GITHUB_OUTPUT

            - name: Check if version changed
              id: check
              run: |
                  git diff HEAD~1 HEAD -- Cargo.toml | grep -q '^+version' && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

    build:
        needs: check-version
        if: needs.check-version.outputs.changed == 'true'
        strategy:
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      name: linux-amd64
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      name: windows-amd64
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      name: macos-amd64
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      name: macos-arm64

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Rename binary (unix)
              if: matrix.os != 'windows-latest'
              run: |
                  cp target/${{ matrix.target }}/release/shamela-extractor \
                     shamela-extractor-${{ matrix.name }}

            - name: Rename binary (windows)
              if: matrix.os == 'windows-latest'
              run: |
                  cp target/${{ matrix.target }}/release/shamela-extractor.exe `
                     shamela-extractor-${{ matrix.name }}.exe

            - uses: actions/upload-artifact@v4
              with:
                  name: shamela-extractor-${{ matrix.name }}
                  path: shamela-extractor-${{ matrix.name }}*

    release:
        needs: [check-version, build]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/download-artifact@v4
              with:
                  path: artifacts/
                  merge-multiple: true

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.check-version.outputs.version }}
                  name: v${{ needs.check-version.outputs.version }}
                  files: artifacts/*
                  generate_release_notes: true
